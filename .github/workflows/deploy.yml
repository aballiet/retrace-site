name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install site dependencies
        run: npm ci

      - name: Install docs dependencies
        run: cd docs && npm ci

      - name: Build marketing site (Astro)
        run: npm run build

      - name: Build docs (Fumadocs)
        run: cd docs && npm run build

      - name: Merge docs into site output
        run: |
          mkdir -p dist/docs
          cp -r docs/out/* dist/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
